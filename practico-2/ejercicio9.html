<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de deportes</title>
</head>
<body>
    <form action="tratar_form.php" method="get" enctype="multipart/form-data">
        <label>Apellido y Nombre:</label><br>
        <input type="text" name="nombre" placeholder="Ej:Juan Pérez"><br><br>
        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Ej: correo@gmail.com"><br><br>
        <label>¿Desea recibir información por email?</label><br>
        <input type="radio" name="info" value="si"> Sí<br>
        <input type="radio" name="info" value="no"> No<br><br>
        <label>Deportes en los que estaría interesado:</label><br>
        <input type="checkbox" name="deportes[]" value="futbol"> Fútbol<br>
        <input type="checkbox" name="deportes[]" value="basquet"> Básquet<br>
        <input type="checkbox" name="deportes[]" value="tenis"> Tenis<br>
        <input type="checkbox" name="deportes[]" value="tenis"> Running<br>
        <input type="checkbox" name="deportes[]" value="tenis"> Natación<br><br>
        <label>¿Cuánto te gusta nuestro sitio? (0 = nada, 10 =mucho)</label><br>
        <input type="range" name="puntaje" min="0" max="10"><br><br>
        <label>Color que le gustaría para las prendas deportivas:</label><br>
        <input type="color" name="color"><br><br>
        <label>Fecha:</label><br>
        <input type="date" name="fecha" required><br><br>
        <label>Teléfono de contacto:</label><br>
        <input type="tel" name="telefono" required placeholder="Ej: 26641234"><br><br>
        <label>Horario en el que se lo puede contactar:</label><br>
        <input type="time" name="hora_desde" required><br>
        <input type="time" name="hora_hasta" required><br><br>
        <label>Adjuntar modelo de prenda:</label><br>
        <input type="file" name="archivo" required><br><br>
        <input type="submit" value="Enviar Encuesta">
    </form>
</body>
</html>
