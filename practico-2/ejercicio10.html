<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
</head>
<body>
    <form action="registro.php" method="post">
        <label>Apellido y Nombre:</label><br>
        <input type="text" name="nombre" placeholder="Ej:Juan Pérez"><br><br>
        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Ej: usuario@gmail.com"><br><br>
        <label>Contraseña:</label><br>
        <input type="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres"><br><br>
        <label>Confirmar Contraseña:</label><br>
        <input type="password" name="confirm_password" required minlength="6" placeholder="Reingrese la contraseña"><br><br>
        <label>Fecha de Nacimiento:</label><br>
        <input type="date" name="fecha_nacimiento" required><br><br>
        <label>Género:</label><br>
        <input type="radio" name="genero" value="masculino"> Masculino<br>
        <input type="radio" name="genero" value="femenino"> Femenino<br>
        <input type="radio" name="genero" value="otro"> Otro<br><br>
        <label>Nombre de Usuario:</label><br>
        <input type="text" name="username" required minlength="4" maxlength="15" placeholder="Ej: juanperez"><br><br>
        <input type="submit" value="Registrarse">
    </form>
</body>
</html>
